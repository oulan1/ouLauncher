<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ouLauncher</title>
    
    <link rel="icon" type="image/png" sizes="512x512" href="512.png">
    <link rel="apple-touch-icon" href="1024.png">
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#0d0015">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d0015;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0d0015 0%, #2a0042 100%);
            z-index: 10;
            padding: 20px;
        }

        /* Эффект жидкого стекла (Glassmorphism) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 45px 35px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 320px;
        }

        /* Кружок загрузки */
        .loader {
            width: 55px;
            height: 55px;
            border: 4px solid rgba(255, 255, 255, 0.08);
            border-top: 4px solid #b24bf3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            letter-spacing: 0.5px;
            text-align: center;
        }

        /* Большая кнопка ouLauncher по центру */
        .launch-btn {
            display: none; /* Появляется после того, как редирект отработал */
            width: 100%;
            background: linear-gradient(135deg, #b24bf3 0%, #7b2cb7 100%);
            border: none;
            color: #ffffff;
            padding: 16px 24px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 8px 25px rgba(178, 75, 243, 0.3);
            text-align: center;
            text-decoration: none;
        }

        .launch-btn:active {
            transform: scale(0.97);
            box-shadow: 0 4px 15px rgba(178, 75, 243, 0.2);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glass-panel">
            <div class="loader" id="main-loader"></div>
            <div class="text" id="status">Запуск ouLauncher...</div>
            
            <button class="launch-btn" id="launch-button">Открыть ouLauncher</button>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const statusText = document.getElementById('status');
            const loader = document.getElementById('main-loader');
            const launchBtn = document.getElementById('launch-button');
            
            let savedUrl = '';

            // Читаем ссылку из link.txt
            fetch('link.txt')
                .then(response => {
                    if (!response.ok) throw new Error();
                    return response.text();
                })
                .then(url => {
                    savedUrl = url.trim();
                    if (savedUrl) {
                        // Сразу же перенаправляем пользователя
                        window.location.href = savedUrl;

                        // Спустя мгновение убираем крутилку загрузки и вешаем кнопку.
                        // Если пользователь вернется сюда (нажмет крестик в PWA), он увидит кнопку.
                        setTimeout(() => {
                            loader.style.display = 'none';
                            statusText.style.display = 'none';
                            launchBtn.style.display = 'block';
                        }, 1000);

                    } else {
                        statusText.innerText = "Ошибка: Файл ссылки пуст";
                        loader.style.display = 'none';
                    }
                })
                .catch(() => {
                    statusText.innerText = "Ошибка загрузки конфигурации";
                    loader.style.display = 'none';
                    // Даже при ошибке сети даем возможность тыкнуть кнопку, если ссылка закешировалась ранее
                    if (savedUrl) {
                        loader.style.display = 'none';
                        statusText.style.display = 'none';
                        launchBtn.style.display = 'block';
                    }
                });

            // Клик по большой кнопке ouLauncher
            launchBtn.addEventListener('click', () => {
                if (savedUrl) {
                    window.location.href = savedUrl;
                } else {
                    // Перестраховка: если вдруг скрипт потерял ссылку, пробуем прочитать файл заново
                    fetch('link.txt')
                        .then(res => res.text())
                        .then(url => {
                            window.location.href = url.trim();
                        });
                }
            });
        });
    </script>

</body>
</html>
