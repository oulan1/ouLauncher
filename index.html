<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ouLauncher</title>
    
    <link rel="icon" type="image/png" sizes="512x512" href="512.png">
    <link rel="apple-touch-icon" href="1024.png">
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#0d0015">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d0015;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0d0015 0%, #2a0042 100%);
            z-index: 10;
            padding: 20px;
        }

        /* Эффект жидкого стекла */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 320px;
        }

        .loader {
            width: 55px;
            height: 55px;
            border: 4px solid rgba(255, 255, 255, 0.08);
            border-top: 4px solid #b24bf3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            letter-spacing: 0.5px;
            text-align: center;
            margin-bottom: 5px;
        }

        /* Кнопки */
        .btn {
            width: 100%;
            border: none;
            color: #ffffff;
            padding: 14px 20px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s ease, opacity 0.2s ease;
            text-align: center;
            text-decoration: none;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Фиолетовая кнопка установки */
        .btn-install {
            display: none; /* Включается через JS, если поддерживается браузером */
            background: linear-gradient(135deg, #b24bf3 0%, #7b2cb7 100%);
            box-shadow: 0 6px 20px rgba(178, 75, 243, 0.3);
        }

        /* Стеклянная кнопка "Пропустить" */
        .btn-skip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
        }

        .btn-skip:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="glass-panel">
            <div class="loader" id="main-loader"></div>
            <div class="text" id="status">Получение ссылки...</div>
            
            <button class="btn btn-install" id="install-button">Установить как приложение</button>
            
            <button class="btn btn-skip" id="skip-button" style="display: none;">Перейти на сайт</button>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const statusText = document.getElementById('status');
            const installBtn = document.getElementById('install-button');
            const skipBtn = document.getElementById('skip-button');
            const loader = document.getElementById('main-loader');
            
            let deferredPrompt;
            let savedUrl = '';

            // 1. Сразу запрашиваем ссылку из link.txt
            fetch('link.txt')
                .then(response => {
                    if (!response.ok) throw new Error();
                    return response.text();
                })
                .then(url => {
                    savedUrl = url.trim();
                    if (savedUrl) {
                        statusText.innerText = "Ссылка готова";
                        skipBtn.style.display = 'block'; // Показываем кнопку "Пропустить"
                        
                        // Автоматический редирект через 1.5 секунды, если пользователь никуда не нажал
                        setTimeout(() => {
                            if (!deferredPrompt) {
                                window.location.href = savedUrl;
                            }
                        }, 1500);
                    } else {
                        statusText.innerText = "Ошибка: Файл конфигурации пуст";
                        loader.style.display = 'none';
                    }
                })
                .catch(() => {
                    statusText.innerText = "Ошибка сети";
                    loader.style.display = 'none';
                });

            // 2. Ловим событие установки (работает в Chrome на Android/ПК)
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                installBtn.style.display = 'block';
                statusText.innerText = "Доступно для установки";
            });

            // Клик по кнопке установки
            installBtn.addEventListener('click', async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.style.display = 'none';
                }
                deferredPrompt = null;
            });

            // Клик по кнопке "Пропустить / Перейти"
            skipBtn.addEventListener('click', () => {
                if (savedUrl) {
                    window.location.href = savedUrl;
                }
            });
        });
    </script>

</body>
</html>
