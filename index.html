<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ouLauncher</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <link rel="icon" type="image/png" sizes="512x512" href="512.png">
    <link rel="apple-touch-icon" href="1024.png">
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#0d0015">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d0015;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0d0015 0%, #2a0042 100%);
            z-index: 10;
            padding: 20px;
            background-size: cover;
            background-position: center;
        }

        /* Полноэкранный плеер для видео */
        #bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 11;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Стеклянная панель скрыта по дефолту, чтобы не бесить лоадером в PWA */
        .glass-panel {
            display: none; 
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 45px 35px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 320px;
            z-index: 12;
        }

        /* Прогресс-бар для тяжелых медиафайлов */
        .progress-box {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #b24bf3, #e0aaff);
            transition: width 0.1s linear;
            border-radius: 10px;
        }

        /* Крутилка лоадера (только для браузера) */
        .loader {
            width: 55px;
            height: 55px;
            border: 4px solid rgba(255, 255, 255, 0.08);
            border-top: 4px solid #b24bf3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            letter-spacing: 0.5px;
            text-align: center;
        }

        /* Кнопки */
        .btn {
            width: 100%;
            border: none;
            color: #ffffff;
            padding: 15px 20px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-align: center;
            text-decoration: none;
            display: none;
        }

        .btn:active { transform: scale(0.97); }

        .btn-install {
            background: linear-gradient(135deg, #b24bf3 0%, #7b2cb7 100%);
            box-shadow: 0 6px 20px rgba(178, 75, 243, 0.3);
        }

        .btn-skip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
        }

        .btn-launch {
            background: linear-gradient(135deg, #b24bf3 0%, #7b2cb7 100%);
            box-shadow: 0 8px 25px rgba(178, 75, 243, 0.4);
            font-size: 16px;
            font-weight: 700;
            padding: 16px 24px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <video id="bg-video" playsinline muted autoplay></video>

        <div class="glass-panel" id="ui-panel">
            <div class="loader" id="main-loader" style="display: none;"></div>
            
            <div class="text" id="status">Загрузка модулей...</div>
            
            <div class="progress-box" id="progress-container" style="display: none;">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
            </div>
            
            <button class="btn btn-install" id="install-button"></button>
            <button class="btn btn-skip" id="skip-button"></button>
            <button class="btn btn-launch" id="launch-button">Открыть ouLauncher</button>
        </div>
    </div>

    <script>
        // Запреты на зум экрана тапами и жестами
        document.addEventListener('touchmove', (e) => { if (e.scale !== undefined && e.scale !== 1) e.preventDefault(); }, { passive: false });
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
        }, false);

        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById('main-container');
            const uiPanel = document.getElementById('ui-panel');
            const video = document.getElementById('bg-video');
            const statusText = document.getElementById('status');
            const loader = document.getElementById('main-loader');
            const progressContainer = document.getElementById('progress-container');
            const progressFill = document.getElementById('progress-fill');
            
            const installBtn = document.getElementById('install-button');
            const skipBtn = document.getElementById('skip-button');
            const launchBtn = document.getElementById('launch-button');
            
            let deferredPrompt;
            let savedUrl = '';
            
            const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

            // Ловим триггер установки для браузера
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                if (!isPWA) {
                    loader.style.display = 'none';
                    progressContainer.style.display = 'none';
                    statusText.innerText = "Доступна установка на рабочий стол";
                    installBtn.innerText = "Установить как приложение";
                    skipBtn.innerText = "Пропустить";
                    installBtn.style.display = 'block';
                    skipBtn.style.display = 'block';
                    uiPanel.style.display = 'flex';
                }
            });

            // Функция умной предзагрузки тяжелых файлов через XHR (сохраняет в Blob)
            function preloadFile(url, onProgress) {
                return new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('GET', url + '?_=' + new Date().getTime(), true);
                    xhr.responseType = 'blob';
                    xhr.onprogress = (e) => {
                        if (e.lengthComputable) {
                            onProgress(e.loaded / e.total);
                        }
                    };
                    xhr.onload = () => {
                        if (xhr.status === 200) {
                            resolve(URL.createObjectURL(xhr.response)); // Создаем локальную ссылку на файл из памяти
                        } else {
                            reject();
                        }
                    };
                    xhr.onerror = () => reject();
                    xhr.send();
                });
            }

            // Загружаем текстовый файл конфигурации
            fetch('link.txt?_=' + new Date().getTime())
                .then(res => res.ok ? res.text() : window.location.reload())
                .then(url => {
                    savedUrl = url.trim();
                    if (!savedUrl) {
                        statusText.innerText = "Ошибка конфигурации ссылки";
                        uiPanel.style.display = 'flex';
                        return;
                    }

                    if (isPWA) {
                        // ---- ЛОГИКА ДЛЯ PWA ----
                        // Показываем стекло загрузки файлов ТОЛЬКО если их надо качать из сети
                        statusText.innerText = "Загрузка ресурсов: 0%";
                        progressContainer.style.display = 'block';
                        uiPanel.style.display = 'flex';

                        let videoBlob = '';
                        let photoBlob = '';

                        // Качаем сначала видео
                        preloadFile('video.mp4', (p) => {
                            let percent = Math.round(p * 100);
                            statusText.innerText = `Загрузка медиа: ${percent}%`;
                            progressFill.style.width = percent + '%';
                        })
                        .then(vBlob => {
                            videoBlob = vBlob;
                            // Затем качаем фото фона
                            return preloadFile('photo.png', () => {});
                        })
                        .then(pBlob => {
                            photoBlob = pBlob;
                            
                            // Файлы в памяти! Запускаем шоу
                            uiPanel.style.display = 'none'; // Скрываем панель прогресс-бара
                            video.src = videoBlob;
                            video.style.display = 'block';
                            video.style.opacity = '1';
                            video.play().catch(() => {});

                            // Ровно через 4 секунды перекидываем на целевой домен
                            setTimeout(() => {
                                window.location.href = savedUrl;

                                // Сценарий возврата при нажатии на крестик
                                setTimeout(() => {
                                    video.style.display = 'none';
                                    video.pause();
                                    container.style.backgroundImage = `url('${photoBlob}')`;
                                    
                                    loader.style.display = 'none';
                                    progressContainer.style.display = 'none';
                                    statusText.style.display = 'none';
                                    installBtn.style.display = 'none';
                                    skipBtn.style.display = 'none';
                                    
                                    launchBtn.style.display = 'block';
                                    uiPanel.style.display = 'flex';
                                }, 1000);

                            }, 4000);
                        })
                        .catch(() => {
                            // Если произошел сбой сети — аварийно редиректим сразу
                            window.location.href = savedUrl;
                        });

                    } else {
                        // ---- ЛОГИКА ДЛЯ БРАУЗЕРА ----
                        loader.style.display = 'block';
                        uiPanel.style.display = 'flex';
                        
                        setTimeout(() => {
                            if (!deferredPrompt) {
                                loader.style.display = 'none';
                                statusText.innerText = "Перенаправление...";
                                skipBtn.innerText = "Открыть";
                                skipBtn.style.display = 'block';
                                setTimeout(() => { window.location.href = savedUrl; }, 1000);
                            }
                        }, 1500);
                    }
                })
                .catch(() => {
                    statusText.innerText = "Ошибка сети";
                    loader.style.display = 'none';
                    uiPanel.style.display = 'flex';
                });

            // Клики по кнопкам управления
            installBtn.addEventListener('click', async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    uiPanel.style.display = 'none';
                    window.location.href = savedUrl;
                }
                deferredPrompt = null;
            });

            skipBtn.addEventListener('click', () => { if (savedUrl) window.location.href = savedUrl; });
            launchBtn.addEventListener('click', () => { if (savedUrl) window.location.href = savedUrl; });
        });
    </script>

</body>
</html>
