<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ouLauncher</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <link rel="icon" type="image/png" sizes="512x512" href="512.png">
    <link rel="apple-touch-icon" href="1024.png">
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#0d0015">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        /* Полный запрет выделения текста и синих подсветок при тапе */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d0015;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0d0015 0%, #2a0042 100%);
            z-index: 10;
            padding: 20px;
            background-size: cover;
            background-position: center;
        }

        /* Полноэкранный плеер для видео-заставки в PWA */
        #bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 11;
            display: none;
        }

        /* Жидкое стекло */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 45px 35px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 320px;
            z-index: 12;
        }

        /* Крутилка лоадера (только для браузера) */
        .loader {
            width: 55px;
            height: 55px;
            border: 4px solid rgba(255, 255, 255, 0.08);
            border-top: 4px solid #b24bf3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            letter-spacing: 0.5px;
            text-align: center;
        }

        /* Кнопки */
        .btn {
            width: 100%;
            border: none;
            color: #ffffff;
            padding: 15px 20px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-align: center;
            text-decoration: none;
            display: none;
        }

        .btn:active {
            transform: scale(0.97);
        }

        /* Установить (Браузер) */
        .btn-install {
            background: linear-gradient(135deg, #b24bf3 0%, #7b2cb7 100%);
            box-shadow: 0 6px 20px rgba(178, 75, 243, 0.3);
        }

        /* Пропустить (Браузер) */
        .btn-skip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
        }

        /* Открыть ouLauncher (PWA) */
        .btn-launch {
            background: linear-gradient(135deg, #b24bf3 0%, #7b2cb7 100%);
            box-shadow: 0 8px 25px rgba(178, 75, 243, 0.4);
            font-size: 16px;
            font-weight: 700;
            padding: 16px 24px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <video id="bg-video" playsinline muted autoplay></video>

        <div class="glass-panel" id="ui-panel">
            <div class="loader" id="main-loader"></div>
            <div class="text" id="status">Загрузка...</div>
            
            <button class="btn btn-install" id="install-button">Установить как приложение</button>
            <button class="btn btn-skip" id="skip-button">Пропустить</button>
            <button class="btn btn-launch" id="launch-button">Открыть ouLauncher</button>
        </div>
    </div>

    <script>
        // БЛОКИРОВКА ПРИБЛИЖЕНИЯ ЖЕСТАМИ НА СТРАНИЦЕ
        document.addEventListener('touchmove', (event) => {
            if (event.scale !== undefined && event.scale !== 1) { 
                event.preventDefault(); 
            }
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', (event) => {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault(); // Запрет двойного тапа для зума
            }
            lastTouchEnd = now;
        }, false);

        // ОСНОВНАЯ ЛОГИКА СТРАНИЦЫ
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById('main-container');
            const uiPanel = document.getElementById('ui-panel');
            const video = document.getElementById('bg-video');
            const statusText = document.getElementById('status');
            const loader = document.getElementById('main-loader');
            
            const installBtn = document.getElementById('install-button');
            const skipBtn = document.getElementById('skip-button');
            const launchBtn = document.getElementById('launch-button');
            
            let deferredPrompt;
            let savedUrl = '';
            
            const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

            // Отлавливаем кнопку установки для обычных браузеров
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                
                if (!isPWA) {
                    loader.style.display = 'none';
                    statusText.innerText = "Доступна установка на рабочий стол";
                    installBtn.style.display = 'block';
                    skipBtn.style.display = 'block';
                }
            });

            // Получаем ссылку
            fetch('link.txt?_=' + new Date().getTime())
                .then(response => {
                    if (!response.ok) throw new Error();
                    return response.text();
                })
                .then(url => {
                    savedUrl = url.trim();
                    if (savedUrl) {
                        
                        if (isPWA) {
                            // ЛОГИКА ДЛЯ PWA
                            uiPanel.style.display = 'none'; // Полностью прячем стекло с лоадером
                            video.src = 'video.mp4';
                            video.style.display = 'block';
                            video.play().catch(() => {}); // Запуск видео глушит ошибки автоплея

                            // Через 4 секунды уводим на основной сайт
                            setTimeout(() => {
                                window.location.href = savedUrl;

                                // На случай, если нажали крестик и вернулись:
                                // Меняем видео на картинку, возвращаем панель, но уже с большой кнопкой
                                setTimeout(() => {
                                    video.style.display = 'none';
                                    video.pause();
                                    container.style.backgroundImage = "url('photo.png')";
                                    
                                    loader.style.display = 'none';
                                    statusText.style.display = 'none';
                                    installBtn.style.display = 'none';
                                    skipBtn.style.display = 'none';
                                    
                                    launchBtn.style.display = 'block';
                                    uiPanel.style.display = 'flex';
                                }, 1000);

                            }, 4000);

                        } else {
                            // ЛОГИКА ДЛЯ БРАУЗЕРА
                            setTimeout(() => {
                                if (!deferredPrompt) {
                                    loader.style.display = 'none';
                                    statusText.innerText = "Перенаправление...";
                                    skipBtn.style.display = 'block';
                                    setTimeout(() => { window.location.href = savedUrl; }, 1000);
                                }
                            }, 1500);
                        }

                    } else {
                        statusText.innerText = "Ошибка: Ссылка пуста";
                        loader.style.display = 'none';
                    }
                })
                .catch(() => {
                    statusText.innerText = "Ошибка сети";
                    loader.style.display = 'none';
                });

            // Клик "Установить" (Браузер)
            installBtn.addEventListener('click', async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.style.display = 'none';
                    skipBtn.style.display = 'none';
                    loader.style.display = 'block';
                    statusText.innerText = "Запуск приложения...";
                    window.location.href = savedUrl;
                }
                deferredPrompt = null;
            });

            // Клик "Пропустить" (Браузер)
            skipBtn.addEventListener('click', () => {
                if (savedUrl) window.location.href = savedUrl;
            });

            // Клик "Открыть ouLauncher" (PWA после возврата)
            launchBtn.addEventListener('click', () => {
                if (savedUrl) window.location.href = savedUrl;
            });
        });
    </script>

</body>
</html>
